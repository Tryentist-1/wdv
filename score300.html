<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Corrected Viewport Meta Tag for Responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>300 Round - OAS Olympic Archery in Schools</title> <!-- Dynamic Title -->
    <link rel="stylesheet" href="css/score300.css">
</head>
<body>
    <div class="container">
        <h1 id="main-title">300 Round - Wed Sep 15 2023</h1> <!-- Dynamic Title -->
        <div class="tabs">
            <button class="tab tab-1 active-tab" data-archer="0">Archer 1</button>
            <button class="tab tab-2" data-archer="1">Archer 2</button>
            <button class="tab tab-3" data-archer="2">Archer 3</button>
            <button class="tab tab-4" data-archer="3">Archer 4</button>
        </div>

        <div id="tabs-container">
            <!-- Archer Tabs Content will be injected here -->
        </div>

        <div id="all-totals">
            <h3>Running Totals for All Archers</h3>
            <table>
                <thead>
                    <tr>
                        <th>Archer</th>
                        <th>10s Total</th>
                        <th>Xs Total</th>
                        <th>RUN</th>
                        <th>AVG</th>
                        <th>Date</th> <!-- Added Date Column -->
                    </tr>
                </thead>
                <tbody id="total-scores"></tbody>
            </table>
        </div>
    </div>

    <!-- Bottom Buttons Container -->
    <div class="bottom-buttons">
        <button class="reset-button" id="reset-button">RESET</button>
 	 	<button class="copy-button" id="copy-totals-button">COPY</button>
        <button class="sms-button" id="sms-button">SMS</button> <!-- New SMS Button -->
		<button class="mail-button" id="mail-button">MAIL</button> <!-- New Mail Button -->

    </div>

    <!-- Modal Structure -->
    <div id="reset-modal" class="modal">
        <div class="modal-content">
            <h2>Reset Options</h2>
            <p>Please choose an action:</p>
            <div class="modal-buttons">
                <button class="modal-button modal-cancel" id="modal-cancel">Cancel</button>
                <button class="modal-button modal-reset" id="modal-reset">Reset</button>
                <button class="modal-button modal-sample" id="modal-sample">Sample</button>
            </div>
        </div>
    </div>

    <script src="js/score300.js"></script>
</body>
</html>
